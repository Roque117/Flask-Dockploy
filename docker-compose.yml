version: "3.9"

services:
  db:
    image: mysql:5.7
    container_name: flask_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flaskcrud
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DB: flaskcrud
      MYSQL_PORT: 3306

volumes:
  db_data: